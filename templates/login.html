<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS (AJUSTADO) -->
<link rel="stylesheet" href="/prestamo-laboratorios-front/Css/style.css">
</head>

<body class="login-body">

<div class="login-container">

    <div class="login-box">
        <h2>💳 Bienvenido</h2>
        <p class="text-muted">Inicia sesión en tu cuenta</p>

        <!-- FORM CORREGIDO -->
        <form method="POST" action="/Proyecto_integrador/Login/procesar_login.php">
            
            <input name="correo" class="form-control mb-3" placeholder="Correo" required>
            
            <input name="contrasena" type="password" class="form-control mb-3" placeholder="Contraseña" required>

            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>

        <!-- LINK CORREGIDO -->
        <p class="mt-3 text-center">
            ¿No tienes cuenta? 
            <a href="/prestamo-laboratorios-front/templates/register.html">Regístrate</a>
        </p>
    </div>

</div>

</body>
</html>
