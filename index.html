<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Préstamo - UPB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="logo">
                <img src="logo.png" alt="UPB">
            </div>
            <div class="user-info">
                Oscar Santoya (Administrador)
                <img src="usuario.png" alt="Usuario">
            </div>
        </div>
    </header>
    <main>
        <div class="form-container">
            <h1>Sistema de Préstamo de Laboratorio</h1>
            <form>
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" name="correo" required placeholder="Correo electrónico">
                
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" name="contrasena" required placeholder="Contraseña">

                <button type="submit">Iniciar sesión</button>
                <p class="forgot">¿Olvidaste tu contraseña?</p>
            </form>
        </div>
    </main>
</body>
</html>
