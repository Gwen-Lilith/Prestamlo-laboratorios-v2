<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva Entrega</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family:'Nunito',sans-serif;
  background:#F0F0F5;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:100%;
  max-width:450px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
  margin-bottom:20px;
  color:#6B1F7C;
}

.form-group{
  margin-bottom:15px;
}

label{
  font-weight:700;
  font-size:13px;
  display:block;
  margin-bottom:5px;
}

input, select{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  width:100%;
  background:#6B1F7C;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:6px;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  background:#4A1258;
}

.success{
  display:none;
  background:#DCFCE7;
  color:#166534;
  padding:10px;
  border-radius:6px;
  margin-bottom:10px;
  font-size:13px;
  font-weight:600;
}
</style>

  <!-- Estilos Responsivos Inyectados -->
  <style>
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar {
        position: fixed;
        top: 52px;
        bottom: 0;
        left: 0;
        z-index: 1000;
        width: 250px !important;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        box-shadow: 2px 0 12px rgba(0,0,0,0.15);
      }
      .sidebar.collapsed {
        transform: translateX(0);
      }
      .stats-row { grid-template-columns: 1fr 1fr !important; }
      .form-row { grid-template-columns: 1fr !important; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 6px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-left { flex-direction: column; align-items: stretch; width: 100%; }
      .search-box { width: 100%; }
      .search-box input { width: 100% !important; }
      .filter-select { width: 100%; }
      .btn-primary { width: 100%; justify-content: center; }
      .btn-export { width: 100%; justify-content: center; margin-top: 10px; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr !important; }
    }
  </style>
</head>

<body>

<div class="card">
    <button onclick="volver()" style="background:#ddd;color:#333;padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;">
    <i class="fa-solid fa-arrow-left"></i> Volver
  </button>
  <h2>Registrar Nueva Entrega</h2>

  <div class="success" id="msg-exito">
    <i class="fa-solid fa-check"></i> Entrega guardada correctamente
    
</div>

  
  <p style="font-size:13px;color:#666;margin-bottom:12px">
    Registra la entrega física de una solicitud <strong>aprobada</strong>.
    El estado de la solicitud pasará a <em>prestada</em> y los elementos
    quedarán bloqueados hasta su devolución.
  </p>

  <div class="form-group">
    <label>ID de la solicitud *</label>
    <input type="number" id="id-solicitud" min="1" placeholder="Ej: 12" />
  </div>

  <div id="info-solicitud" style="display:none;background:#F9F9FC;border:1px solid #E2E2EE;border-radius:8px;padding:12px;margin-bottom:14px;font-size:13px"></div>

  <div class="form-group">
    <label>Observaciones (opcional)</label>
    <input type="text" id="obs" placeholder="Comentario sobre la entrega" />
  </div>

  <button onclick="guardarEntrega()">Guardar Entrega</button>
</div>

<script>
const API = 'backend/modules/';

function volver(){
  window.location.href = "dashboard.html";
}

// Al salir del campo ID, precargamos la info de la solicitud para confirmar.
document.getElementById('id-solicitud').addEventListener('blur', async () => {
  const id = parseInt(document.getElementById('id-solicitud').value, 10);
  const info = document.getElementById('info-solicitud');
  if (!id) { info.style.display = 'none'; return; }
  try {
    const resp = await fetch(API + 'solicitudes/detalle.php?id=' + id, { credentials:'same-origin' });
    const json = await resp.json();
    if (!resp.ok || !json.ok) {
      info.style.display = 'block';
      info.style.color = '#9D174D';
      info.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + (json.mensaje || 'No se encontró la solicitud.');
      return;
    }
    const d = json.data;
    info.style.display = 'block';
    info.style.color = '#1A1A2E';
    const nombreSol = `${d.t_nombres||''} ${d.t_apellidos||''}`.trim();
    const elems = Array.isArray(d.elementos) ? d.elementos.map(e => e.elemento_nombre).join(', ') : '—';
    info.innerHTML = `
      <strong>Solicitud #${d.n_idsolicitud}</strong> — estado actual:
      <strong style="color:#6B1F7C">${d.t_estado}</strong><br/>
      Solicitante: ${nombreSol}<br/>
      Laboratorio: ${d.laboratorio_nombre||'—'}<br/>
      Elementos: ${elems}
    `;
  } catch (err) {
    info.style.display = 'block';
    info.style.color = '#9D174D';
    info.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> No se pudo contactar al servidor.';
  }
});

async function guardarEntrega(){
  const id  = parseInt(document.getElementById('id-solicitud').value, 10);
  const obs = document.getElementById('obs').value.trim();

  if (!id || id < 1) { alert("Ingresa un ID de solicitud válido."); return; }

  try {
    const resp = await fetch(API + 'solicitudes/registrar_entrega.php', {
      method:'POST',
      credentials:'same-origin',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id, observaciones: obs })
    });
    const json = await resp.json();
    if (!resp.ok || !json.ok) {
      alert(json.mensaje || 'No se pudo registrar la entrega.');
      return;
    }
    document.getElementById('msg-exito').style.display = 'block';
    document.getElementById('id-solicitud').value = '';
    document.getElementById('obs').value = '';
    document.getElementById('info-solicitud').style.display = 'none';
  } catch (err) {
    alert('No se pudo contactar al servidor.');
  }
}

</script>

<script src="assets/js/volver.js" defer></script>
</body>
</html>
