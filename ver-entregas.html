<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

<title>Ver Entregas PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{font-family:'Nunito';background:#F0F0F5;padding:30px}
.container{max-width:1000px;margin:auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
h2{color:#6B1F7C}

.top-bar{display:flex;gap:10px;margin-bottom:15px}

input,select{
  padding:8px 10px;
  border:1px solid #ddd;
  border-radius:6px;
}

.btn{
  background:#ddd;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
}

.table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

th,td{padding:12px;font-size:13px}
th{background:#6B1F7C;color:#fff}

.estado{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700}
.entregado{background:#DCFCE7;color:#166534}
.pendiente{background:#FEF3C7;color:#92400E}

.btn-accion{
  border:none;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.btn-edit{background:#EDE9FE;color:#5B21B6}
.btn-delete{background:#FEE2E2;color:#991B1B}

.stats{margin-bottom:10px;font-size:13px;font-weight:700;color:#444}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:300px;
}
</style>

  <!-- Estilos Responsivos Inyectados -->
  <style>
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar {
        position: fixed;
        top: 52px;
        bottom: 0;
        left: 0;
        z-index: 1000;
        width: 250px !important;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        box-shadow: 2px 0 12px rgba(0,0,0,0.15);
      }
      .sidebar.collapsed {
        transform: translateX(0);
      }
      .stats-row { grid-template-columns: 1fr 1fr !important; }
      .form-row { grid-template-columns: 1fr !important; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 6px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-left { flex-direction: column; align-items: stretch; width: 100%; }
      .search-box { width: 100%; }
      .search-box input { width: 100% !important; }
      .filter-select { width: 100%; }
      .btn-primary { width: 100%; justify-content: center; }
      .btn-export { width: 100%; justify-content: center; margin-top: 10px; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr !important; }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>Gestión de Entregas</h2>
    <button class="btn" onclick="volver()"><i class="fa-solid fa-arrow-left"></i> Volver</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="top-bar">
    <input type="text" id="buscador" placeholder="Buscar..." oninput="render()">
    <select id="filtro" onchange="render()">
      <option value="">Todos</option>
      <option value="entregado">Entregado</option>
      <option value="pendiente">Pendiente</option>
    </select>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Equipo</th>
        <th>Usuario</th>
        <th>Fecha</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

</div>

<!-- MODAL EDITAR -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Editar</h3>
    <input id="edit-equipo" placeholder="Equipo"><br><br>
    <input id="edit-usuario" placeholder="Usuario"><br><br>
    <select id="edit-estado">
      <option value="entregado">Entregado</option>
      <option value="pendiente">Pendiente</option>
    </select><br><br>
    <button onclick="guardarEdit()">Guardar</button>
  </div>
</div>

<script>

// "Entregas" en el modelo del backend son las solicitudes que ya
// salieron físicamente (estado 'prestada') o fueron devueltas ('finalizada').
// Todo viene del backend, nada en localStorage.
const API = 'backend/modules/';
let data = [];

function escapeHtml(s) {
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function cargarEntregas() {
  try {
    const [rP, rF] = await Promise.all([
      fetch(API + 'solicitudes/listar.php?estado=prestada&_t=' + Date.now(),   { credentials:'same-origin' }),
      fetch(API + 'solicitudes/listar.php?estado=finalizada&_t=' + Date.now(), { credentials:'same-origin' })
    ]);
    const [jP, jF] = await Promise.all([rP.json(), rF.json()]);
    const rows = []
      .concat(jP.ok && Array.isArray(jP.data) ? jP.data : [])
      .concat(jF.ok && Array.isArray(jF.data) ? jF.data : []);

    data = rows.map(s => ({
      id:      parseInt(s.n_idsolicitud, 10),
      equipo:  s.elementos_nombres || '—',
      usuario: `${s.t_nombres||''} ${s.t_apellidos||''}`.trim(),
      fecha:   (s.dt_fechainicio || '').substring(0,10),
      // UI: 'entregado' (= prestada) / 'pendiente' se mapea de 'finalizada' a 'entregado'/'devuelto'.
      // Mantenemos 2 estados visibles: 'entregado' y 'devuelto'.
      estado:  s.t_estado === 'prestada' ? 'entregado' : 'devuelto'
    }));
  } catch (err) {
    data = [];
  }
}

function render(){
  const busqueda = (document.getElementById('buscador').value || '').toLowerCase();
  const filtro   = document.getElementById('filtro').value;

  const filtrado = data.filter(e =>
    (e.equipo.toLowerCase().includes(busqueda) || e.usuario.toLowerCase().includes(busqueda)) &&
    (!filtro || e.estado === filtro)
  );

  document.getElementById('stats').textContent =
    `Total: ${data.length} | Mostrando: ${filtrado.length}`;

  document.getElementById('tbody').innerHTML = filtrado.map(e => `
    <tr>
      <td>${escapeHtml(e.equipo)}</td>
      <td>${escapeHtml(e.usuario)}</td>
      <td>${escapeHtml(e.fecha)}</td>
      <td><span class="estado ${e.estado}">${e.estado}</span></td>
      <td>
        <a class="btn-accion btn-edit" href="Admin-Solicitud-Detalle.html?id=${e.id}" title="Ver detalle"><i class="fa-solid fa-eye"></i></a>
      </td>
    </tr>
  `).join('');
}

function volver(){
  window.location.href = "dashboard.html";
}

(async () => {
  await cargarEntregas();
  render();
})();

</script>

<script src="assets/js/volver.js" defer></script>
</body>
</html>
